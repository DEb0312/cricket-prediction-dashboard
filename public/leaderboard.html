<!DOCTYPE html>
<html>

<head>

<title>Leaderboard</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<h2>Leaderboard</h2>

<table id="table">

<tr>
<th>User</th>
<th>Score</th>
</tr>

</table>

<script>

function loadLeaderboard(){

fetch("/api/leaderboard")
.then(res=>res.json())
.then(data=>{

let table = document.getElementById("table")

// clear old rows except header
table.innerHTML = `
<tr>
<th>User</th>
<th>Score</th>
</tr>
`

data.forEach(user=>{

table.innerHTML += `
<tr>
<td>${user.username}</td>
<td>${user.score}</td>
</tr>
`

})

})

}

// load first time
loadLeaderboard()

// auto refresh every 3 seconds
setInterval(loadLeaderboard,3000)

</script>

</body>
</html>
